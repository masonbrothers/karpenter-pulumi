name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: package
      - uses: actions/checkout@v4
        with:
          repository: masonbrothers/crd2pulumi-package-tools
          path: crd2pulumi-package-tools
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: package/pnpm-lock.yaml
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - run: go install github.com/pulumi/crd2pulumi@v1.4.0
      - run: pnpm install --frozen-lockfile
        working-directory: package
      - run: pnpm generate:crds
        working-directory: package
      - run: git diff --exit-code
        working-directory: package
      - run: pnpm typecheck
        working-directory: package
      - run: pnpm build
        working-directory: package
      - run: pnpm --if-present test
        working-directory: package
      - run: npm publish --provenance --access public
        working-directory: package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
