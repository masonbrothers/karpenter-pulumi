name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: package
      - uses: actions/checkout@v4
        with:
          repository: masonbrothers/crd2pulumi-package-tools
          path: crd2pulumi-package-tools
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: package/pnpm-lock.yaml
      - run: |
          curl -sSLO https://github.com/pulumi/crd2pulumi/releases/download/v1.6.2/checksums.txt
          curl -sSLO https://github.com/pulumi/crd2pulumi/releases/download/v1.6.2/crd2pulumi-v1.6.2-linux-amd64.tar.gz
          grep ' crd2pulumi-v1.6.2-linux-amd64.tar.gz$' checksums.txt | sha256sum -c -
          tar -xzf crd2pulumi-v1.6.2-linux-amd64.tar.gz crd2pulumi
          sudo mv crd2pulumi /usr/local/bin/crd2pulumi
          crd2pulumi --help >/dev/null
      - run: pnpm install --frozen-lockfile
        working-directory: package
      - run: node -e 'const pkg = require("./package.json"); const tag = process.env.GITHUB_REF_NAME; const allowed = new Set([pkg.version, `v${pkg.version}`, `${pkg.name}@${pkg.version}`, `${pkg.name}-${pkg.version}`, `${pkg.name}-v${pkg.version}`]); if (!allowed.has(tag)) { console.error(`Release tag ${tag} does not match ${pkg.name} version ${pkg.version}`); process.exit(1); }'
        working-directory: package
      - run: pnpm generate:crds
        working-directory: package
      - run: |
          git status --short
          test -z "$(git status --porcelain)"
        working-directory: package
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: crd-smoke
          wait: 90s
      - run: pnpm test:kind
        working-directory: package
      - run: pnpm typecheck
        working-directory: package
      - run: pnpm build
        working-directory: package
      - run: pnpm --if-present test
        working-directory: package
      - run: pnpm test:dist
        working-directory: package
      - run: pnpm test:pack
        working-directory: package
      - run: npm pack --dry-run
        working-directory: package
      - run: npm publish --provenance --access public
        working-directory: package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
